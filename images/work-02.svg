<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">Taskify App mockup</title>
  <desc id="desc">A soft green laptop composition with editorial line art and a clean workstation feel.</desc>
  <defs>
    <linearGradient id="w2-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#dfead1" />
      <stop offset="52%" stop-color="#cdddb8" />
      <stop offset="100%" stop-color="#b7caa0" />
    </linearGradient>
    <linearGradient id="w2-shadow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#101010" stop-opacity="0.16" />
      <stop offset="100%" stop-color="#101010" stop-opacity="0.04" />
    </linearGradient>
    <filter id="w2-blur" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#101010" flood-opacity="0.18" />
    </filter>
  </defs>

  <rect width="1600" height="1000" fill="url(#w2-bg)" />
  <path d="M0 280 L1600 420 L1600 0 L0 0 Z" fill="#ffffff" opacity="0.09" />
  <path d="M0 700 L1600 880 L1600 1000 L0 1000 Z" fill="#ffffff" opacity="0.08" />

  <ellipse cx="840" cy="760" rx="420" ry="120" fill="#101010" opacity="0.16" />
  <ellipse cx="820" cy="740" rx="360" ry="96" fill="#ffffff" opacity="0.12" />

  <g transform="translate(300 210)" filter="url(#w2-blur)">
    <rect x="180" y="40" width="860" height="540" rx="26" fill="#0e0e0e" />
    <rect x="204" y="66" width="812" height="484" rx="16" fill="#f7f5ef" />
    <rect x="204" y="552" width="812" height="26" fill="#3d3d3d" />

    <rect x="300" y="610" width="664" height="26" rx="10" fill="#686868" />
    <rect x="372" y="640" width="520" height="16" rx="8" fill="url(#w2-shadow)" />
    <rect x="420" y="630" width="78" height="10" rx="5" fill="#9b9b9b" />

    <g opacity="0.95">
      <rect x="248" y="92" width="168" height="8" fill="#101010" />
      <rect x="248" y="112" width="116" height="6" fill="#101010" opacity="0.18" />
      <rect x="248" y="128" width="142" height="6" fill="#101010" opacity="0.18" />
      <rect x="248" y="144" width="102" height="6" fill="#101010" opacity="0.18" />
      <rect x="248" y="176" width="128" height="7" fill="#101010" opacity="0.18" />
      <rect x="248" y="194" width="150" height="7" fill="#101010" opacity="0.18" />
      <rect x="248" y="212" width="112" height="7" fill="#101010" opacity="0.18" />
    </g>

    <g transform="translate(560 110)">
      <rect x="0" y="0" width="300" height="260" fill="#eef3df" />
      <path d="M32 180 C78 128, 96 98, 124 46" fill="none" stroke="#8ab46d" stroke-width="6" stroke-linecap="round" />
      <path d="M68 144 C104 112, 132 102, 160 80" fill="none" stroke="#8ab46d" stroke-width="5" stroke-linecap="round" />
      <path d="M118 180 C154 146, 190 130, 226 96" fill="none" stroke="#8ab46d" stroke-width="5" stroke-linecap="round" />
      <path d="M120 34 C146 58, 174 72, 204 92" fill="none" stroke="#8ab46d" stroke-width="4" stroke-linecap="round" />
      <path d="M144 42 C162 26, 182 24, 204 28" fill="none" stroke="#8ab46d" stroke-width="4" stroke-linecap="round" />
      <circle cx="238" cy="210" r="36" fill="#5a915c" opacity="0.9" />
      <circle cx="182" cy="176" r="16" fill="#d9e8b6" />
      <circle cx="154" cy="150" r="14" fill="#d9e8b6" />
      <circle cx="88" cy="178" r="18" fill="#d9e8b6" />
      <rect x="0" y="196" width="300" height="64" fill="#ffffff" opacity="0.6" />
    </g>

    <rect x="270" y="118" width="246" height="166" fill="#ffffff" opacity="0.9" />
    <rect x="270" y="318" width="610" height="132" fill="#ffffff" opacity="0.78" />
  </g>

  <g opacity="0.22">
    <rect x="128" y="160" width="150" height="6" fill="#101010" />
    <rect x="128" y="176" width="106" height="6" fill="#101010" />
    <rect x="128" y="192" width="124" height="6" fill="#101010" />
  </g>

  <rect x="78" y="110" width="48" height="250" fill="#f6f7f0" opacity="0.55" />
  <text x="102" y="126" font-size="14" font-family="Space Grotesk, Arial, sans-serif" fill="#101010" opacity="0.45" transform="rotate(90 102 126)">IMAGE NOT INCLUDED</text>
</svg>

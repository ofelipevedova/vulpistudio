<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 700" role="img" aria-labelledby="title desc">
  <title id="title">Abstract design composition</title>
  <desc id="desc">A wide abstract composition with layered panels, lines, and circles inspired by design systems.</desc>
  <defs>
    <linearGradient id="about-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#faf8f5" />
      <stop offset="100%" stop-color="#f2efe8" />
    </linearGradient>
    <linearGradient id="about-red" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff4d4f" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#ff8a7d" stop-opacity="0.7" />
    </linearGradient>
    <linearGradient id="about-dark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#101010" />
      <stop offset="100%" stop-color="#2a2a2a" />
    </linearGradient>
    <filter id="about-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#101010" flood-opacity="0.12" />
    </filter>
  </defs>

  <rect width="1600" height="700" fill="url(#about-bg)" />
  <rect x="0" y="0" width="1600" height="700" fill="url(#about-bg)" />

  <circle cx="250" cy="180" r="260" fill="url(#about-red)" opacity="0.18" />
  <circle cx="1325" cy="620" r="180" fill="#101010" opacity="0.05" />
  <path d="M1120 90 C1230 140, 1285 190, 1400 260" fill="none" stroke="#ff4d4f" stroke-width="3" stroke-linecap="round" opacity="0.6" />
  <path d="M1120 90 C1230 140, 1285 190, 1400 260" fill="none" stroke="#ff4d4f" stroke-width="14" stroke-linecap="round" opacity="0.07" />


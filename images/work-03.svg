<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">Fashion Brand mockup</title>
  <desc id="desc">A warm editorial composition with layered cards, typography blocks, and abstract brand system elements.</desc>
  <defs>

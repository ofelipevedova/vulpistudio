<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex,nofollow">
    <title>Vulpi Studio | Contato enviado</title>
    <style>
        :root {
            color-scheme: light;
        }

        html, body {
            margin: 0;
            min-height: 100%;
            background: #fff;
            color: #101010;
            font-family: "Space Grotesk", system-ui, sans-serif;
        }

        body {
            display: grid;
            place-items: center;
            padding: 2rem;
            text-align: center;
        }

        p {
            margin: 0;
            font-size: 1rem;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <p>Mensagem enviada. Você pode fechar esta aba.</p>
    <script>
        (function () {
            if (window.parent && window.parent !== window) {
                window.parent.postMessage({ type: "contact-form-success" }, "*");
            }
        }());
    </script>
</body>
</html>
